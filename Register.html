<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="Register.css">
</head>
<body>

<div class="login-box">
    <h2>Silahkan Isikan Data</h2>

    <form>

        <div class="user-box">
            <input type="text" required="">
            <label>First name</label>
        </div>

        <div class="user-box">
            <input type="text" required="">
            <label>Middle name</label>
        </div>

        <div class="user-box">
            <input type="text" required="">
            <label>Last name</label>
        </div>

        <div class="user-box">
            <input type="date" required="">
            <label class="active">Tanggal Lahir</label>
        </div>

        <div class="gender-box">
            <span>Jenis Kelamin</span>
            <div class="radio-group">
                <label class="radio">
                    <input type="radio" name="gender"> Pria </label>

                <label class="radio">
                    <input type="radio" name="gender"> Wanita </label>
            </div>
        </div>

        <div class="user-box">
            <input list="browsers" name="browser">
            <label>Tempat Tinggal</label>
                <datalist id="browsers">
                    <option value="Medan">
                    <option value="Sunggal">
                    <option value="Pakam">
                    <option value="Helvet">
                    <option value="Johor">
                </datalist>
        </div>

        <div class="user-box">
            <input type="text" required="">
            <label>Email</label>
        </div>

        <div class="user-box">
            <input type="text" required="">
            <label>Phone</label>
        </div>

        <div class="user-box">
            <input type="password" required="">
            <label>Password</label>
         </div>   
            <a href="#">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                Register
            </a>
        </form>
        <div class="back-center">
            <span class="Kembali">Kembali</span>
            <a href="login.html" class="back-link">Back</a>
        </div>
</div>

</body>
</html>
